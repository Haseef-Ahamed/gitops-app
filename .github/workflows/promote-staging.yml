name: Promote to Staging (PR)

on:
  push:
    tags:
      - 'v*.*.*'

env:
  IMG_NAME: haseef-ahamed/gitops-app

jobs:
  open-staging-pr:
    name: Open Staging PR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout manifests
        run: |
          git clone https://x-access-token:${{ secrets.MANIFEST_TOKEN }}@github.com/${{ github.repository_owner }}/gitops-manifests.git

      - name: Read dev state
        id: dev
        run: |
          cd gitops-manifests
          git checkout main
          DEV_IMAGE=$(grep "image:" dev/deployment.yml | awk '{print $2}')
          DEV_VERSION=$(grep -A1 "name: APP_VERSION" dev/deployment.yml \
            | grep value | awk '{print $2}' | tr -d '"')
          echo "DEV_IMAGE=$DEV_IMAGE" >> $GITHUB_OUTPUT
          echo "DEV_VERSION=$DEV_VERSION" >> $GITHUB_OUTPUT
          echo "Dev image:   $DEV_IMAGE"
          echo "Dev version: $DEV_VERSION"

      - name: Create promotion branch
        run: |
          cd gitops-manifests

          # Create a new branch for this promotion PR
          BRANCH="promote/${{ github.ref_name }}"
          git checkout staging
          git checkout -b "$BRANCH"

          # Update staging manifest
          sed -i "s|image: ghcr.io/.*/gitops-app:.*|image: ${{ steps.dev.outputs.DEV_IMAGE }}|g" staging/deployment.yml
          sed -i "/name: APP_VERSION/{n;s|value:.*|value: \"${{ steps.dev.outputs.DEV_VERSION }}\"|}" staging/deployment.yml

          git config user.email "ci@gitops.local"
          git config user.name "CI Bot"
          git add staging/deployment.yml
          git commit -m "promote(staging): ${{ steps.dev.outputs.DEV_IMAGE }} version=${{ steps.dev.outputs.DEV_VERSION }}"
          git push origin "$BRANCH"

      - name: Open Pull Request
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.MANIFEST_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository_owner }}/gitops-manifests/pulls \
            -d '{
              "title": "🚀 Promote ${{ github.ref_name }} to Staging",
              "body": "## Staging Promotion\n\n**Triggered by:** `${{ github.ref_name }}` tag\n**Image:** `${{ steps.dev.outputs.DEV_IMAGE }}`\n**Version:** `${{ steps.dev.outputs.DEV_VERSION }}`\n\n## Checklist\n- [ ] Dev environment tested\n- [ ] No errors in dev logs\n- [ ] Performance acceptable\n- [ ] Ready for staging\n\n## How to verify dev before merging\n```bash\ncurl http://localhost:3000/version\ncurl http://localhost:3000/health\n```\n\nMerge this PR to deploy to staging.",
              "head": "promote/${{ github.ref_name }}",
              "base": "staging"
            }'

      - name: Summary
        run: |
          echo "════════════════════════════════════════════"
          echo "✅ Pull Request opened!"
          echo "   Go to: github.com/Haseef-Ahamed/gitops-manifests"
          echo "   Review and merge the PR to deploy to staging"
          echo "════════════════════════════════════════════"