name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMG_NAME: haseef-ahamed/gitops-app

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run tests
        run: npm test

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: haseef-ahamed
          password: ${{ secrets.MANIFEST_TOKEN }}

      - name: Generate image tag
        id: tag
        run: echo "IMAGE_TAG=sha-$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Read version from package.json
        id: version
        run: |
          APP_VER=$(node -p "require('./package.json').version")
          echo "APP_VERSION=v${APP_VER}" >> $GITHUB_OUTPUT
          echo "Detected version: v${APP_VER}"

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          provenance: false
          tags: |
            ghcr.io/${{ env.IMG_NAME }}:${{ steps.tag.outputs.IMAGE_TAG }}
            ghcr.io/${{ env.IMG_NAME }}:latest

      - name: Update dev manifest
        run: |
          git clone https://x-access-token:${{ secrets.MANIFEST_TOKEN }}@github.com/${{ github.repository_owner }}/gitops-manifests.git
          cd gitops-manifests

          # Update image tag
          sed -i "s|image: ghcr.io/.*/gitops-app:.*|image: ghcr.io/${{ env.IMG_NAME }}:${{ steps.tag.outputs.IMAGE_TAG }}|g" dev/deployment.yml

          # Update APP_VERSION (finds APP_VERSION line, then updates the next line)
          sed -i "/name: APP_VERSION/{n;s|value:.*|value: \"${{ steps.version.outputs.APP_VERSION }}\"|}" dev/deployment.yml

          git config user.email "ci@gitops.local"
          git config user.name "CI Bot"
          git add dev/deployment.yml
          git diff --staged
          git commit -m "ci: update dev image=${{ steps.tag.outputs.IMAGE_TAG }} version=${{ steps.version.outputs.APP_VERSION }}"
          git push