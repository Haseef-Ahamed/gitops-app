name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMG_NAME: haseef-ahamed/gitops-app

jobs:
  # ══════════════════════════════════════════
  # JOB 1: Run Tests
  # ══════════════════════════════════════════
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

  # ══════════════════════════════════════════
  # JOB 2: Build and Push Image
  # ══════════════════════════════════════════
  build:
    name: Build and Push Image
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image_tag: ${{ steps.tag.outputs.IMAGE_TAG }}
      app_version: ${{ steps.version.outputs.APP_VERSION }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: haseef-ahamed
          password: ${{ secrets.MANIFEST_TOKEN }}

      - name: Generate image tag
        id: tag
        run: echo "IMAGE_TAG=sha-$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Read version from package.json
        id: version
        run: |
          APP_VER=$(node -p "require('./package.json').version")
          echo "APP_VERSION=v${APP_VER}" >> $GITHUB_OUTPUT
          echo "Detected version: v${APP_VER}"

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          provenance: false
          tags: |
            ghcr.io/${{ env.IMG_NAME }}:${{ steps.tag.outputs.IMAGE_TAG }}
            ghcr.io/${{ env.IMG_NAME }}:latest

  # ══════════════════════════════════════════
  # JOB 3: Deploy to Dev ONLY
  # ══════════════════════════════════════════
  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    needs: build
    environment: dev

    steps:
      - name: Checkout manifests repo
        run: |
          git clone https://x-access-token:${{ secrets.MANIFEST_TOKEN }}@github.com/${{ github.repository_owner }}/gitops-manifests.git
          cd gitops-manifests

          # Update image tag — DEV ONLY
          sed -i "s|image: ghcr.io/.*/gitops-app:.*|image: ghcr.io/${{ env.IMG_NAME }}:${{ needs.build.outputs.image_tag }}|g" dev/deployment.yml

          # Update APP_VERSION — DEV ONLY
          sed -i "/name: APP_VERSION/{n;s|value:.*|value: \"${{ needs.build.outputs.app_version }}\"|}" dev/deployment.yml

          git config user.email "ci@gitops.local"
          git config user.name "CI Bot"
          git add dev/deployment.yml
          git diff --staged
          git commit -m "ci(dev): image=${{ needs.build.outputs.image_tag }} version=${{ needs.build.outputs.app_version }}"
          git push

      - name: Summary
        run: |
          echo "✅ Deployed to DEV"
          echo "   Image:   ${{ needs.build.outputs.image_tag }}"
          echo "   Version: ${{ needs.build.outputs.app_version }}"
          echo ""
          echo "⏳ Staging: run ./promote.sh when dev is verified"